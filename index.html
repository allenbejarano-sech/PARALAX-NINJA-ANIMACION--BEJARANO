<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bosque Mágico</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
}

/* ESCENA */
.scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    /* 🔥 FONDO A PANTALLA COMPLETA */
    background: url("img/peakpx (1).jpg") center center / cover no-repeat;

    animation: zoom 15s ease-in-out infinite alternate;
}

/* BRILLO */
.glow{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 30% 40%, rgba(0,255,200,.15), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0,150,255,.18), transparent 45%);

    mix-blend-mode:screen;
    animation:pulse 4s infinite alternate;
}

/* NIEBLA */
.fog{
    position:absolute;
    width:200%;
    height:200%;

    background:
    radial-gradient(circle, rgba(0,255,255,.06), transparent 60%);

    animation:fogMove 30s linear infinite;

    mix-blend-mode:screen;
}

/* PNG EN EL SUELO */
.png{
    position:absolute;

    left:50%;
    bottom:40px;

    transform:translateX(-50%);

    width:110px;

    animation:
    floatPNG 3s ease-in-out infinite,
    glowPNG 2.5s ease-in-out infinite alternate;

    filter:
    drop-shadow(0 0 10px cyan)
    drop-shadow(0 0 25px #00ffee);
}

/* PARTICULAS */
.particle{
    position:absolute;
    border-radius:50%;

    background:#7fffd4;

    box-shadow:
    0 0 5px #7fffd4,
    0 0 15px #00ffee,
    0 0 30px #00ffee;

    animation:float linear infinite;
}

/* ANIMACIONES */

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    10%{opacity:1;}
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes pulse{
    from{opacity:.4;}
    to{opacity:1;}
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

@keyframes fogMove{
    from{transform:translateX(-10%) translateY(-5%);}
    to{transform:translateX(10%) translateY(5%);}
}

@keyframes floatPNG{
    0%{
        transform:translateX(-50%) translateY(0px);
    }
    50%{
        transform:translateX(-50%) translateY(-8px);
    }
    100%{
        transform:translateX(-50%) translateY(0px);
    }
}

@keyframes glowPNG{
    from{
        filter:
        drop-shadow(0 0 10px cyan)
        drop-shadow(0 0 20px #00ffee);
    }
    to{
        filter:
        drop-shadow(0 0 25px cyan)
        drop-shadow(0 0 60px #00ffee);
    }
}

</style>
</head>

<body>

<div class="scene" id="scene">

    <div class="glow"></div>
    <div class="fog"></div>

    <!-- PERSONAJE -->
    <img src="img/personaje.png" class="png">

</div>

<script>

const scene = document.getElementById("scene");

/* partículas */
for(let i=0;i<150;i++){

    const p = document.createElement("div");
    p.classList.add("particle");

    let size = Math.random()*4+2;

    p.style.width = size+"px";
    p.style.height = size+"px";

    p.style.left = Math.random()*100+"vw";
    p.style.top = Math.random()*100+"vh";

    p.style.animationDuration = (5+Math.random()*10)+"s";
    p.style.animationDelay = Math.random()*5+"s";

    scene.appendChild(p);
}

</script>

</body>
</html>
